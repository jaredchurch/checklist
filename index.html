<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2196f3" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <title>Checklist PWA</title>
    <link rel="stylesheet" href="src/style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Checklist</h1>
      </header>
      <main>
        <section id="controls" class="controls">
          <button id="add-item">Add Item</button>
          <button id="add-list">Add List</button>

          <div class="global-context-menu">
            <button id="global-context-toggle" class="small-button">⋮</button>
            <div id="global-context" class="context-menu">
              <button id="global-mark-all-done">Mark All Done</button>
              <button id="global-mark-all-not-done">Mark All Not Done</button>
              <button id="global-export">Export JSON</button>
              <button id="global-import">Import JSON</button>
              <button id="global-about">About</button>
            </div>
          </div>
        </section>

        <section id="tree" class="tree"></section>

        <dialog id="about-dialog" class="about-dialog" aria-label="About Checklist">
          <h2>About Checklist PWA</h2>
          <p>This checklist app stores all data locally.</p>
          <br>The current version info is pulled from the branch used by GitHub Pages.</br>
          <div id="about-commit-info">Loading commit info...</div>
          <button id="close-about">Close</button>
        </dialog>
      </main>
      <!--
      <footer>
        <small>Installed data is saved locally in LocalStorage and persisted by service worker caching.</small>
      </footer>
      -->
    </div>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
