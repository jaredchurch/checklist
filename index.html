    <div id="app">
      <header>
        <h1>Checklist PWA</h1>
        <p>Infinite nested lists with done/not-done controls</p>
      </header>
      <main>
        <section id="controls" class="controls">
          <button id="add-item">Add Item</button>
          <button id="add-list">Add List</button>
          <button id="mark-all-done">Mark All Done</button>
          <button id="mark-all-not-done">Mark All Not Done</button>
          <button id="export">Export JSON</button>
          <label class="import-label">
            Import JSON
            <input id="import" type="file" accept="application/json" />

        </section>

        <section id="tree" class="tree"></section>
      </main>
      <footer>
        <small>Installed data is saved locally in LocalStorage and persisted by service worker caching.</small>
